  <!-- Particles system standalone script -->
  <script>
    (function() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let particlesArray = [];
      const mouse = { x: null, y: null, radius: 150 };

      const resizeCanvas = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      document.addEventListener('mouseleave', () => {
        mouse.x = null;
        mouse.y = null;
      });

      class Particle {
        constructor(x, y, directionX, directionY, size, color) {
          this.x = x;
          this.y = y;
          this.directionX = directionX;
          this.directionY = directionY;
          this.size = size;
          this.color = color;
          this.baseSize = size;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
        update() {
          if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
          if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
          this.x += this.directionX;
          this.y += this.directionY;

          if (mouse.x !== null && mouse.y !== null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < mouse.radius) {
              const force = (mouse.radius - distance) / mouse.radius;
              this.x -= (dx / distance) * force * 2;
              this.y -= (dy / distance) * force * 2;
              this.size = Math.min(this.baseSize * 1.8, 3.5);
            } else {
              if (this.size > this.baseSize) this.size -= 0.1;
            }
          } else {
            if (this.size > this.baseSize) this.size -= 0.1;
          }
          this.draw();
        }
      }

      const init = () => {
        particlesArray = [];
        const num = Math.min(Math.floor((canvas.width * canvas.height) / 12000), 100);
        for (let i = 0; i < num; i++) {
          let size = Math.random() * 1.5 + 0.8;
          let x = Math.random() * (canvas.width - size * 2) + size;
          let y = Math.random() * (canvas.height - size * 2) + size;
          let directionX = (Math.random() * 0.4) - 0.2;
          let directionY = (Math.random() * 0.4) - 0.2;
          let color = Math.random() > 0.8 ? 'rgba(6, 182, 212, 0.4)' : Math.random() > 0.7 ? 'rgba(139, 92, 246, 0.4)' : 'rgba(255,255,255,0.12)';
          particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
        }
      };

      const connect = () => {
        for (let a = 0; a < particlesArray.length; a++) {
          for (let b = a + 1; b < particlesArray.length; b++) {
            let dx = particlesArray[a].x - particlesArray[b].x;
            let dy = particlesArray[a].y - particlesArray[b].y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < 120) {
              let opacity = 1 - (distance / 120);
              ctx.strokeStyle = `rgba(255, 255, 255, ${opacity * 0.04})`;
              ctx.lineWidth = 0.8;
              ctx.beginPath();
              ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
              ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
              ctx.stroke();
            }
          }
        }
      };

      const animate = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
        }
        connect();
        requestAnimationFrame(animate);
      };

      init();
      animate();
    })();
  </script>

  <!-- React standalone app logic compiled via Babel -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 1. Custom Lag Follower Cursor Component
    const CustomCursor = () => {
      const ringRef = useRef(null);
      const dotRef = useRef(null);
      const mousePos = useRef({ x: 0, y: 0 });
      const ringPos = useRef({ x: 0, y: 0 });
      const [hovered, setHovered] = useState(false);
      const [visible, setVisible] = useState(false);

      useEffect(() => {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) return;
        setVisible(true);

        const onMouseMove = (e) => {
          mousePos.current.x = e.clientX;
          mousePos.current.y = e.clientY;
        };

        const onMouseOver = (e) => {
          const target = e.target;
          const isInteractive = 
            target.tagName === 'A' || 
            target.tagName === 'BUTTON' || 
            target.closest('button') || 
            target.closest('a') || 
            target.getAttribute('data-hover') === 'true';
          setHovered(isInteractive);
        };

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseover', onMouseOver);

        let rafId;
        const render = () => {
          const lerp = (start, end, amt) => (1 - amt) * start + amt * end;
          ringPos.current.x = lerp(ringPos.current.x, mousePos.current.x, 0.15);
          ringPos.current.y = lerp(ringPos.current.y, mousePos.current.y, 0.15);

          if (ringRef.current) {
            ringRef.current.style.transform = `translate3d(${ringPos.current.x - 20}px, ${ringPos.current.y - 20}px, 0) scale(${hovered ? 1.6 : 1})`;
            ringRef.current.style.borderColor = hovered ? '#8b5cf6' : '#06b6d4';
            ringRef.current.style.background = hovered ? 'rgba(139, 92, 246, 0.1)' : 'transparent';
          }
          if (dotRef.current) {
            dotRef.current.style.transform = `translate3d(${mousePos.current.x - 4}px, ${mousePos.current.y - 4}px, 0)`;
            dotRef.current.style.backgroundColor = hovered ? '#8b5cf6' : '#06b6d4';
          }
          rafId = requestAnimationFrame(render);
        };
        render();

        return () => {
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseover', onMouseOver);
          cancelAnimationFrame(rafId);
        };
      }, [hovered]);

      if (!visible) return null;
      return (
        <React.Fragment>
          <div ref={ringRef} className="fixed top-0 left-0 w-10 h-10 border border-cyber-teal rounded-full pointer-events-none z-50 transition-all duration-300 ease-out shadow-[0_0_10px_rgba(6,182,212,0.1)]" style={{ transform: 'translate3d(-100px, -100px, 0)' }} />
          <div ref={dotRef} className="fixed top-0 left-0 w-2 h-2 bg-cyber-teal rounded-full pointer-events-none z-50 transition-colors duration-200" style={{ transform: 'translate3d(-100px, -100px, 0)' }} />
        </React.Fragment>
      );
    };

    // 2. Navigation Header Component
    const Navbar = ({ activeSection, isDarkMode, toggleTheme }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);

      const navItems = [
        { name: 'Home', href: '#home' },
        { name: 'About', href: '#about' },
        { name: 'Skills', href: '#skills' },
        { name: 'Projects', href: '#projects' },
        { name: 'Timeline', href: '#timeline' },
        { name: 'Contact', href: '#contact' },
      ];

      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 20);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const handleNavClick = (e, href) => {
        e.preventDefault();
        setIsOpen(false);
        const targetElement = document.querySelector(href);
        if (targetElement) {
          targetElement.scrollIntoView({ behavior: 'smooth' });
        }
      };

      return (
        <nav className={`fixed top-0 left-0 w-full z-40 transition-all duration-500 ${scrolled ? 'py-4 bg-obsidian/75 backdrop-blur-md border-b border-white/5' : 'py-6 bg-transparent border-transparent'}`}>
          <div className="max-w-7xl mx-auto px-6 md:px-12 flex items-center justify-between">
            <a href="#home" onClick={(e) => handleNavClick(e, '#home')} className="flex items-center space-x-2 text-white font-heading font-extrabold text-xl tracking-wider group">
              <i data-lucide="terminal" className="w-5 h-5 text-cyber-teal group-hover:text-cyber-purple transition-colors duration-300"></i>
              <span className="bg-gradient-to-r from-cyber-teal to-cyber-purple bg-clip-text text-transparent">PIYUSH.DEV</span>
            </a>

            {/* Desktop items */}
            <div className="hidden md:flex items-center space-x-8">
              {navItems.map((item) => {
                const isActive = activeSection === item.href.replace('#', '');
                return (
                  <a key={item.name} href={item.href} onClick={(e) => handleNavClick(e, item.href)} className={`font-medium text-sm tracking-wide transition-all duration-300 hover:text-cyber-teal relative py-2 ${isActive ? 'text-cyber-teal font-semibold' : 'text-slate-400'}`}>
                    {item.name}
                    <span className={`absolute bottom-0 left-0 w-full h-[2px] bg-gradient-to-r from-cyber-teal to-cyber-purple transition-transform duration-300 origin-left ${isActive ? 'scale-x-100' : 'scale-x-0'}`} />
                  </a>
                );
              })}
            </div>

            {/* Controls */}
            <div className="flex items-center space-x-4">
              <button onClick={toggleTheme} className="p-2.5 rounded-lg glass-panel hover:border-cyber-teal text-slate-300 hover:text-cyber-teal transition-all">
                {isDarkMode ? <i data-lucide="sun" className="w-4.5 h-4.5"></i> : <i data-lucide="moon" className="w-4.5 h-4.5"></i>}
              </button>
              <a href="#" className="hidden sm:flex items-center space-x-2 px-4 py-2 border border-cyber-teal/30 hover:border-cyber-teal bg-cyber-teal/5 hover:bg-cyber-teal/15 rounded-lg text-xs font-semibold tracking-wider text-cyber-teal uppercase transition-all duration-300 shadow-neon-teal">
                <i data-lucide="download" className="w-3.5 h-3.5"></i>
                <span>Resume</span>
              </a>
              <button onClick={() => setIsOpen(!isOpen)} className="md:hidden p-2 rounded-lg text-slate-300 hover:text-white glass-panel">
                {isOpen ? <i data-lucide="x" className="w-5 h-5"></i> : <i data-lucide="menu" className="w-5 h-5"></i>}
              </button>
            </div>
          </div>

          {/* Mobile Overlay */}
          <div className={`fixed top-[74px] left-0 w-full h-[calc(100vh-74px)] bg-obsidian/95 backdrop-blur-lg border-t border-white/5 transition-all duration-500 ease-in-out md:hidden ${isOpen ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-6 pointer-events-none'}`}>
            <div className="flex flex-col items-center justify-center h-full space-y-8 pb-12">
              {navItems.map((item) => {
                const isActive = activeSection === item.href.replace('#', '');
                return (
                  <a key={item.name} href={item.href} onClick={(e) => handleNavClick(e, item.href)} className={`text-xl font-heading tracking-wide ${isActive ? 'text-cyber-teal font-bold' : 'text-slate-300'}`}>
                    {item.name}
                  </a>
                );
              })}
              <a href="#" className="flex items-center space-x-2 px-6 py-3 border border-cyber-teal bg-cyber-teal/10 rounded-lg text-sm font-semibold tracking-wider text-cyber-teal uppercase shadow-neon-teal animate-pulse">
                <i data-lucide="download" className="w-4.5 h-4.5"></i>
                <span>Download Resume</span>
              </a>
            </div>
          </div>
        </nav>
      );
    };

    // 3. 3D Hero Section Component (Hooks Native ThreeJS Canvas)
    const Hero = () => {
      const roles = ['Python Developer', 'Machine Learning Enthusiast', 'FastAPI Learner', 'Frontend + Backend Explorer'];
      const [roleIndex, setRoleIndex] = useState(0);
      const [currentText, setCurrentText] = useState('');
      const [isDeleting, setIsDeleting] = useState(false);
      const canvasRef = useRef(null);

      // Typing loop
      useEffect(() => {
        let timer;
        const currentRole = roles[roleIndex];
        const tick = () => {
          if (!isDeleting) {
            setCurrentText(currentRole.substring(0, currentText.length + 1));
            if (currentText === currentRole) {
              timer = setTimeout(() => setIsDeleting(true), 1500);
              return;
            }
          } else {
            setCurrentText(currentRole.substring(0, currentText.length - 1));
            if (currentText === '') {
              setIsDeleting(false);
              setRoleIndex((prev) => (prev + 1) % roles.length);
              return;
            }
          }
          timer = setTimeout(tick, isDeleting ? 45 : 90);
        };
        timer = setTimeout(tick, 90);
        return () => clearTimeout(timer);
      }, [currentText, isDeleting, roleIndex]);

      // ThreeJS Native Morphing Blob Canvas initialisation
      useEffect(() => {
        if (!canvasRef.current) return;
        const canvas = canvasRef.current;
        const parent = canvas.parentElement;
        
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, parent.offsetWidth / parent.offsetHeight, 0.1, 100);
        camera.position.z = 4.5;

        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(parent.offsetWidth, parent.offsetHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

        // Geometry: Morphing cyber sphere
        const geometry = new THREE.SphereGeometry(1.4, 64, 64);
        
        // ShaderMaterial for organic liquid morphing blob
        const material = new THREE.MeshStandardMaterial({
          color: 0x8b5cf6,
          roughness: 0.15,
          metalness: 0.9,
          wireframe: false,
        });

        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // Orbiting cyber wireframes
        const torusGeom = new THREE.TorusGeometry(1.8, 0.1, 16, 100);
        const torusMat = new THREE.MeshStandardMaterial({ color: 0x06b6d4, wireframe: true });
        const torus = new THREE.Mesh(torusGeom, torusMat);
        scene.add(torus);

        const cubeGeom = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const cubeMat = new THREE.MeshStandardMaterial({ color: 0x10b981, wireframe: true });
        const cube = new THREE.Mesh(cubeGeom, cubeMat);
        cube.position.set(2.4, 1.5, -1);
        scene.add(cube);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x444444);
        scene.add(ambientLight);

        const purpleLight = new THREE.PointLight(0x8b5cf6, 8, 15);
        purpleLight.position.set(-3, 3, 2);
        scene.add(purpleLight);

        const tealLight = new THREE.PointLight(0x06b6d4, 8, 15);
        tealLight.position.set(3, -3, 2);
        scene.add(tealLight);

        const followLight = new THREE.PointLight(0xec4899, 10, 10);
        followLight.position.set(0, 0, 3);
        scene.add(followLight);

        // Mouse interaction coordinate tracking
        let mouseX = 0, mouseY = 0;
        const handleMouseMove = (e) => {
          const rect = parent.getBoundingClientRect();
          mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
          mouseY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        };
        parent.addEventListener('mousemove', handleMouseMove);

        // Save original geometry vertices positions to morph relative to them
        const positionAttribute = geometry.attributes.position;
        const originalPositions = [];
        for (let i = 0; i < positionAttribute.count; i++) {
          originalPositions.push(
            new THREE.Vector3(
              positionAttribute.getX(i),
              positionAttribute.getY(i),
              positionAttribute.getZ(i)
            )
          );
        }

        // Render loop
        let clock = new THREE.Clock();
        let animationFrameId;

        const animate = () => {
          const time = clock.getElapsedTime();
          
          // Organic morph calculations by moving vertices via mathematical sine/cosine noise offsets
          const positions = geometry.attributes.position;
          for (let i = 0; i < originalPositions.length; i++) {
            const vertex = originalPositions[i];
            
            // Generate waving noise offset
            const waveX = Math.sin(vertex.x * 2.5 + time * 1.5) * 0.12;
            const waveY = Math.cos(vertex.y * 2.5 + time * 1.5) * 0.12;
            const waveZ = Math.sin(vertex.z * 2.5 + time * 1.5) * 0.12;
            
            positions.setXYZ(
              i,
              vertex.x + waveX,
              vertex.y + waveY,
              vertex.z + waveZ
            );
          }
          geometry.attributes.position.needsUpdate = true;

          // Sphere rotations
          sphere.rotation.y = time * 0.1;
          sphere.rotation.x = time * 0.05;

          // Torus rotations

          // Follower light tracking
          followLight.position.x = mouseX * 4;
          followLight.position.y = mouseY * 3;

          // Smooth camera perspective tilting
          camera.position.x += (mouseX * 1.2 - camera.position.x) * 0.05;
          camera.position.y += (mouseY * 0.8 - camera.position.y) * 0.05;
          camera.lookAt(scene.position);

          renderer.render(scene, camera);
          animationFrameId = requestAnimationFrame(animate);
        };
        animate();

        const handleResize = () => {
          camera.aspect = parent.offsetWidth / parent.offsetHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(parent.offsetWidth, parent.offsetHeight);
        };
        window.addEventListener('resize', handleResize);

        // Cleanup
        return () => {
          parent.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('resize', handleResize);
          cancelAnimationFrame(animationFrameId);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, parent.offsetWidth / parent.offsetHeight, 0.1, 100);
        camera.position.z = 4.2;

        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(parent.offsetWidth, parent.offsetHeight);

        // Core Glowing sphere
        const sphereGeom = new THREE.SphereGeometry(0.8, 32, 32);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0x8b5cf6, emissive: 0x8b5cf6, emissiveIntensity: 1.0 });
        const sphere = new THREE.Mesh(sphereGeom, sphereMat);
        scene.add(sphere);

        // Outer Wireframe Cube
        const cubeGeom = new THREE.BoxGeometry(2.0, 2.0, 2.0);
        const cubeMat = new THREE.MeshStandardMaterial({ color: 0x06b6d4, wireframe: true, roughness: 0.1 });
        const cube = new THREE.Mesh(cubeGeom, cubeMat);
        scene.add(cube);

        // Ambient & lights
        const ambientLight = new THREE.AmbientLight(0x555555);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x10b981, 10, 10);
        pointLight.position.set(2, 2, 2);
        scene.add(pointLight);

        let clock = new THREE.Clock();
        let animationFrameId;

        const animate = () => {
          const elapsed = clock.getElapsedTime();
          cube.rotation.x = elapsed * 0.35;
          cube.rotation.y = elapsed * 0.5;

          camera.aspect = parent.offsetWidth / parent.offsetHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(parent.offsetWidth, parent.offsetHeight);

        const { name, value } = e.target;
        setFormData({ ...formData, [name]: value });
        if (errors[name]) setErrors({ ...errors, [name]: null });
      };

      const validateForm = () => {
        let tempErrors = {};
        if (!formData.name.trim()) tempErrors.name = 'Name is required';
        if (!formData.email.trim()) {
          tempErrors.email = 'Email is required';
        } else if (!/\S+@\S+\.\S+/.test(formData.email)) {
          tempErrors.email = 'Email is invalid';

        if (!formData.message.trim()) tempErrors.message = 'Message is required';
        setErrors(tempErrors);
        return Object.keys(tempErrors).length === 0;
      };

        e.preventDefault();

        setStatus('loading');

          particleCount: 150,

                    </button>
                  </form>
                ) : (
                  <div className="flex flex-col items-center justify-center py-12 text-center space-y-6">
                    <div className="p-4 bg-cyber-green/10 border border-cyber-green/30 rounded-full animate-bounce shadow-neon-green">
                      <i data-lucide="check-circle-2" className="w-10 h-10 text-cyber-green"></i>
                    </div>
                    <div className="space-y-2">
                      <h3 className="text-2xl font-heading font-extrabold text-white tracking-wide">TRANSMISSION RECEIVED</h3>
                      <p className="text-[10px] font-mono font-semibold text-cyber-teal uppercase tracking-widest animate-pulse">Holographic Code: SUCCESS_200</p>
                    </div>
                    <p className="text-sm text-slate-400 max-w-sm font-light leading-relaxed">
                      Thank you, your message has bypassed firewalls and landed directly in my console. I will respond to you shortly!
                    </p>
                    <button onClick={() => setStatus('idle')} className="px-6 py-2.5 border border-white/10 hover:border-cyber-teal bg-white/5 hover:bg-cyber-teal/5 text-xs font-bold uppercase tracking-wider text-slate-300 hover:text-cyber-teal rounded-lg transition-all">Send Another Transmission</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        </section>
      );
    };

    // 9. Minimal Footer Component
    const Footer = () => {
      const currentYear = new Date().getFullYear();
      
      const socialItems = [
        { name: 'GitHub', href: '#', path: "M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" },
        { name: 'LinkedIn', href: '#', path: "M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" }
      ];

      return (
        <footer className="relative w-full bg-obsidian py-12 border-t border-white/5 overflow-hidden z-10">
          <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-[450px] h-[150px] rounded-full bg-cyber-purple/5 blur-[80px] pointer-events-none -z-10" />

          <div className="max-w-7xl mx-auto px-6 md:px-12 flex flex-col items-center space-y-8">
            <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="p-3 border border-white/10 hover:border-cyber-teal bg-white/5 rounded-full hover:text-cyber-teal transition-all shadow-[0_4px_15px_rgba(0,0,0,0.5)] group">
              <i data-lucide="chevron-up" className="w-5 h-5 group-hover:translate-y-[-2px] transition-transform"></i>
            </button>

            {/* Social pills */}
            <div className="flex items-center space-x-6">
              {socialItems.map((social) => (
                <a key={social.name} href={social.href} className="p-2.5 border border-white/5 hover:border-cyber-purple bg-white/2 hover:bg-cyber-purple/10 text-slate-400 hover:text-white rounded-xl transition-all hover:scale-110" title={social.name}>
                  <svg className="w-4.5 h-4.5 fill-current" viewBox="0 0 24 24"><path d={social.path}></path></svg>
                </a>
              ))}
            </div>

            <div className="text-center space-y-2 pt-6 border-t border-white/5 w-full max-w-md font-mono text-[10px] text-slate-500 uppercase tracking-widest">
              <p>Designed & Developed by <span className="bg-gradient-to-r from-cyber-teal to-cyber-purple bg-clip-text text-transparent font-bold">Piyush</span></p>
              <p className="text-[9px] text-slate-600">&copy; {currentYear} PIYUSH.DEV. All Rights Reserved.</p>
            </div>
          </div>
        </footer>
      );
    };

    // 10. Main Core Application Assembly Component
    const App = () => {
      const [activeSection, setActiveSection] = useState('home');
      const [isDarkMode, setIsDarkMode] = useState(true);

      // Initialize Lenis smooth scroll globally inside independent HTML environment
      useEffect(() => {
        const lenis = new Lenis({
          duration: 1.2,
          easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
          smoothWheel: true,
        });
        const raf = (time) => {
          lenis.raf(time);
          requestAnimationFrame(raf);
        };
        requestAnimationFrame(raf);
        
        // Refresh Lucide icons in UMD space
        if (window.lucide) {
          window.lucide.createIcons();
        }

        return () => lenis.destroy();
      }, []);

      // Active Section Observer
      useEffect(() => {
        const sections = document.querySelectorAll('section, div[id="projects"]');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) setActiveSection(entry.target.id);
          });
        }, { rootMargin: '-30% 0px -40% 0px' });

        sections.forEach((s) => observer.observe(s));
        return () => observer.disconnect();
      }, []);

      // Re-trigger Lucide icons creation upon DOM updates
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      const toggleTheme = () => {
        setIsDarkMode((prev) => {
          const next = !prev;
          if (next) {
            document.documentElement.classList.remove('light-theme');
          } else {
            document.documentElement.classList.add('light-theme');
          }
          return next;
        });
      };

      return (
        <React.Fragment>
          <CustomCursor />
          <Navbar activeSection={activeSection} isDarkMode={isDarkMode} toggleTheme={toggleTheme} />
          <main className="relative z-10 w-full overflow-hidden">
            <Hero />
            <About />
            <Skills />
            <Projects />
            <Timeline />
            <Contact />
          </main>
          <Footer />
        </React.Fragment>
      );
    };

    // Render React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
