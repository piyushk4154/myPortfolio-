<!-- ══════════ PARTICLE SYSTEM (vanilla JS) ══════════ -->
<script>
(function(){
  const cvs = document.getElementById('pcanvas');
  const ctx = cvs.getContext('2d');
  let particles = [];
  const mouse = { x:null, y:null, r:160 };

  function resize(){
    cvs.width  = window.innerWidth;
    cvs.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x=e.clientX; mouse.y=e.clientY; });
  document.addEventListener('mouseleave', () => { mouse.x=null; mouse.y=null; });

  function Particle(){
    this.reset = function(){
      this.x  = Math.random()*cvs.width;
      this.y  = Math.random()*cvs.height;
      this.vx = (Math.random()-.5)*.35;
      this.vy = (Math.random()-.5)*.35;
      this.r  = Math.random()*1.4+.6;
      this.br = this.r;
      const rnd = Math.random();
      this.color = rnd>.82 ? 'rgba(6,182,212,.5)'
                 : rnd>.7  ? 'rgba(139,92,246,.5)'
                 : 'rgba(255,255,255,.13)';
    };
    this.reset();
  }

  const NUM = Math.min(Math.floor(window.innerWidth*window.innerHeight/10000), 110);
  for(let i=0;i<NUM;i++){ const p=new Particle(); p.x=Math.random()*cvs.width; p.y=Math.random()*cvs.height; particles.push(p); }

  function draw(){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>cvs.width)  p.vx*=-1;
      if(p.y<0||p.y>cvs.height) p.vy*=-1;

      if(mouse.x!==null){
        const dx=mouse.x-p.x, dy=mouse.y-p.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<mouse.r){
          const f=(mouse.r-dist)/mouse.r;
          p.x-=(dx/dist)*f*2.2;
          p.y-=(dy/dist)*f*2.2;
          p.r=Math.min(p.br*1.9,3.2);
        } else if(p.r>p.br) p.r-=.08;
      } else if(p.r>p.br) p.r-=.08;

      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.fill();
    });

    // Connect nearby dots
    for(let a=0;a<particles.length;a++){
      for(let b=a+1;b<particles.length;b++){
        const dx=particles[a].x-particles[b].x;
        const dy=particles[a].y-particles[b].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<115){
          ctx.beginPath();
          ctx.strokeStyle=`rgba(255,255,255,${(1-d/115)*.045})`;
          ctx.lineWidth=.7;
          ctx.moveTo(particles[a].x,particles[a].y);
          ctx.lineTo(particles[b].x,particles[b].y);
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

/*  3. ABOUT                                              */
/* ─────────────────────────────────────────────────────── */
const About = () => {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    const canvas = canvasRef.current;
    const el = canvas.parentElement;

    const scene  = new THREE.Scene();
    const cam    = new THREE.PerspectiveCamera(50, el.clientWidth/el.clientHeight, 0.1, 100);
    cam.position.z = 4.2;
    const ren = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
    ren.setSize(el.clientWidth, el.clientHeight);

    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(.82, 32, 32),
      new THREE.MeshStandardMaterial({ color:0x8b5cf6, emissive:0x8b5cf6, emissiveIntensity:.9 })
    );
    scene.add(sphere);

    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(2.1,2.1,2.1),
      new THREE.MeshStandardMaterial({ color:0x06b6d4, wireframe:true })
    );
    scene.add(cube);

    scene.add(new THREE.AmbientLight(0x666666));
    const pl = new THREE.PointLight(0x10b981,12,12); pl.position.set(2,2,2); scene.add(pl);

    const clock = new THREE.Clock();
    let raf;
    const loop = () => {
      raf = requestAnimationFrame(loop);
      const t = clock.getElapsedTime();
      cube.rotation.x = t*.35; cube.rotation.y = t*.5;
      cube.position.y = sphere.position.y = Math.sin(t*1.4)*.14;
      ren.render(scene, cam);
    };
    loop();
    const onR = () => { cam.aspect=el.clientWidth/el.clientHeight; cam.updateProjectionMatrix(); ren.setSize(el.clientWidth,el.clientHeight); };
    window.addEventListener('resize',onR);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize',onR); };
  }, []);

  const tilt = e => {
    const c = e.currentTarget, r = c.getBoundingClientRect();
    const tx = ((e.clientY-r.top)/r.height-.5)*-16;
    const ty = ((e.clientX-r.left)/r.width-.5)*16;
    c.style.transform = `perspective(900px) rotateX(${tx}deg) rotateY(${ty}deg) scale(1.03)`;
  };
  const reset = e => { e.currentTarget.style.transform=''; };

  const cards = [
    { icon:'brain', color:'text-cyber-teal', bg:'bg-cyber-teal/5 border-cyber-teal/20', title:'ML Engineering', desc:'Supervised models, clustering, data pipelines & predictive analytics.' },
    { icon:'server', color:'text-cyber-purple', bg:'bg-cyber-purple/5 border-cyber-purple/20', title:'Python Core', desc:'High-level computing scripts, automation, and core architecture.' },
    { icon:'database', color:'text-cyber-green', bg:'bg-cyber-green/5 border-cyber-green/20', title:'Data Science', desc:'Pandas, NumPy, Matplotlib — EDA, pattern discovery & data visualisation.' },
  ];

  return (
    <section id="about" className="relative min-h-screen flex items-center py-24 px-6 md:px-12 bg-obsidian overflow-hidden">
      <div className="absolute inset-0 cyber-grid opacity-15 pointer-events-none"/>
      <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full bg-cyber-purple/5 blur-[130px] pulsing-glow pointer-events-none"/>

      <div className="max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">

        <div className="space-y-10">
          <div>
            <span className="text-xs uppercase font-extrabold tracking-widest text-cyber-teal border-l-2 border-cyber-teal pl-3">Who I Am</span>
            <h2 className="mt-3 text-4xl md:text-5xl font-heading font-extrabold text-white leading-tight">
              Crafting Intelligent<br/>Solutions
            </h2>
          </div>
          <p className="text-lg text-slate-300 font-light leading-relaxed">
            I'm a passionate CS student focused on{' '}
            <span className="text-cyber-teal font-medium">Python</span>,{' '}
            <span className="text-cyber-purple font-medium">Machine Learning</span>,{' '}
            <span className="text-cyber-green font-medium">Data Analysis</span> &{' '}
            <span className="text-cyber-teal font-medium">Backend Logic</span>.
            I love turning raw data into insights and ideas into products.
          </p>

          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
            {cards.map(c => (
              <div key={c.title} onMouseMove={tilt} onMouseLeave={reset}
                   className="glass-card rounded-2xl p-5 cursor-pointer transition-all duration-300"
                   style={{transformStyle:'preserve-3d'}}>
                <div className={`inline-flex p-2.5 rounded-xl border mb-4 ${c.bg}`}>
                  <Icon name={c.icon} className={`w-5 h-5 ${c.color}`}/>
                </div>
                <h3 className="font-heading font-bold text-white mb-1.5">{c.title}</h3>
                <p className="text-xs text-slate-400 font-light leading-relaxed">{c.desc}</p>
              </div>
            ))}
          </div>
        </div>

        {/* Spinning cube canvas */}
        <div className="h-[360px] md:h-[440px] relative rounded-3xl overflow-hidden border border-white/5 bg-white/2">
          <canvas ref={canvasRef} className="w-full h-full block"/>
          <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-1.5 text-[10px] text-slate-500 uppercase tracking-widest font-bold pointer-events-none">
            <Icon name="eye" className="w-3.5 h-3.5 text-cyber-teal"/>
            Interactive 3D Grid
          </div>
        </div>
      </div>
    </section>
  );
};

/* ─────────────────────────────────────────────────────── */
/*  APP ROOT                                              */
/* ─────────────────────────────────────────────────────── */
const App = () => {
  const [active, setActive] = useState('home');
  const [dark, setDark]     = useState(true);

  /* Active section observer */
  useEffect(()=>{
    const ids = ['home','about','skills','projects','timeline','contact'];
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(en=>{ if(en.isIntersecting) setActive(en.target.id); });
    },{ rootMargin:'-35% 0px -40% 0px' });
    ids.forEach(id=>{ const el=document.getElementById(id); if(el) obs.observe(el); });
    return ()=>obs.disconnect();
  },[]);

  /* Section fade-in on scroll */
  useEffect(()=>{
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(en=>{ en.target.classList.toggle('section-visible', en.isIntersecting); });
    },{ threshold:0.08 });
    document.querySelectorAll('.section-hidden').forEach(el=>obs.observe(el));
    return ()=>obs.disconnect();
  },[]);

  /* Remove loading screen once React mounts */
  useEffect(()=>{
    const ls = document.getElementById('loading-screen');
    if(ls){ ls.classList.add('fade-out'); setTimeout(()=>ls.remove(), 700); }
  },[]);

  const toggleDark = () => {
    setDark(d=>{
      document.documentElement.classList.toggle('light-mode', d);
      return !d;
    });
  };

  return (
    <React.Fragment>
      <Navbar active={active} dark={dark} toggleDark={toggleDark}/>
      <main>
        <Hero/>
        <div className="section-hidden"><About/></div>
        <div className="section-hidden"><Skills/></div>
        <div className="section-hidden"><Projects/></div>
        <div className="section-hidden"><Timeline/></div>
        <div className="section-hidden"><Contact/></div>
      </main>
      <Footer/>
    </React.Fragment>
  );
};

/* Mount */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
